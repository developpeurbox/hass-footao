blueprint:
  name: Footao - Notification jour de match
  description: >
    Envoie une notification si au moins un des capteurs de match indique
    un match "Aujourd'hui". Le titre et le message sont personnalisables.
  domain: automation

  input:
    match_sensors:
      name: Capteurs de matchs
      description: "Liste des capteurs FOOTAO"
      selector:
        entity:
          domain: sensor
          multiple: true
          filter:
            include:
              - entity_id: "sensor.footao*"

    notification_service:
      name: Groupe de notification
      description: "Groupe notify (ex: notify.mobiles_famille)"
      selector:
        entity:
          domain: notify
          filter:
            include:
              - entity_id: "notify.mobiles_*"

    notify_time:
      name: Heure de vérification
      description: Heure quotidienne de contrôle
      default: "08:00:00"
      selector:
        time:

    title_template:
      name: Titre de la notification
      description: Template Jinja pour le titre
      default: "⚽ Jour de match !"
      selector:
        text:

    message_template:
      name: Message de la notification
      description: >
        Template Jinja pour le message.
        La variable `matches` contient la liste des capteurs ayant un match aujourd'hui.
      default: >
        {% for s in matches %}
        ⚽ {{ state_attr(s, 'event_name') }} à {{ state_attr(s, 'heure') }}
        📺 {{ state_attr(s, 'chaine') }}

        {% endfor %}
      selector:
        text:

trigger:
  - platform: time
    at: !input notify_time

variables:
  matches: >
    {{ expand(match_sensors)
       | selectattr('attributes.date', 'eq', "Aujourd'hui")
       | map(attribute='entity_id')
       | list }}

condition:
  - condition: template
    value_template: >
      {{ matches | length > 0 }}

action:
  - service: !input notification_service
    data:
      title: >
        {{ title_template }}
      message: >
        {{ message_template }}

mode: single
