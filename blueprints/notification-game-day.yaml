blueprint:
  name: Notification jour de match (football – multi-clubs)
  description: >
    Envoie une notification si au moins un capteur FOOTAO indique
    un match "Aujourd'hui". Le titre et le message sont personnalisables.
  domain: automation

  input:
    match_sensors:
      name: Capteurs de matchs FOOTAO
      description: Sélectionner uniquement des capteurs sensor.footao*
      selector:
        entity:
          domain: sensor
          multiple: true

    notification_service:
      name: Service de notification
      description: "Ex: notify.mobiles_famille"
      default: notify.notify
      selector:
        text:

    notify_time:
      name: Heure de vérification
      default: "08:00:00"
      selector:
        time:

    title_template:
      name: Titre de la notification
      default: "⚽ Jour de match !"
      selector:
        text:

    message_template:
      name: Message de la notification
      description: "Variable disponible : matches (liste des entity_id du jour)"
      default: >-
        {% for s in matches %}⚽ {{ state_attr(s, 'event_name') }} à {{ state_attr(s, 'heure') }}
        📺 {{ state_attr(s, 'chaine') }}
        {% endfor %}
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input notify_time

variables:
  # ⚠️ Les inputs doivent être capturés dans des variables
  # avant d'être utilisables dans d'autres templates
  input_sensors: !input match_sensors
  input_title: !input title_template
  input_message: !input message_template
  notify_svc: !input notification_service

  matches: >
    {{ expand(input_sensors)
       | selectattr('entity_id', 'match', '^sensor\.footao')
       | selectattr('attributes.date', 'eq', "Aujourd'hui")
       | map(attribute='entity_id')
       | list }}

  # Évaluation des templates personnalisés avec la variable 'matches' disponible
  title_rendered: "{{ input_title }}"
  message_rendered: >
    {% for s in matches %}
    ⚽ {{ state_attr(s, 'event_name') }} à {{ state_attr(s, 'heure') }}
    📺 {{ state_attr(s, 'chaine') }}
    {% endfor %}

condition:
  - condition: template
    value_template: "{{ matches | length > 0 }}"

action:
  - action: "{{ notify_svc }}"  
    data:
      title: "{{ title_rendered }}"
      message: "{{ message_rendered }}"

mode: single
