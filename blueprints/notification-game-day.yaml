blueprint:
  name: "Footao - Notification jour de match"
  description: >
    Envoie une notification si au moins un capteur FOOTAO indique
    un match "Aujourd'hui".
  domain: automation

  input:
    match_sensors:
      name: Capteurs de matchs FOOTAO
      description: Sélectionner les capteurs sensor.footao*
      selector:
        entity:
          domain: sensor
          multiple: true

    notification_service:
      name: Service de notification
      description: "Ex: notify.mobiles_famille"
      default: notify.notify
      selector:
        text:

    notify_time:
      name: Heure de vérification
      default: "08:00:00"
      selector:
        time:

    title_template:
      name: Titre de la notification
      default: "⚽ Jour de match !"
      selector:
        text:

    message_template:
      name: Message de la notification
      default: "Match aujourd'hui !"
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input notify_time

variables:
  input_sensors: !input match_sensors
  notify_svc: !input notification_service
  title_rendered: !input title_template
  message_rendered: !input message_template

  # Filtrage par attribut date == "Aujourd'hui"
  matches: >
    {% set ns = namespace(result=[]) %}
    {% for entity_id in input_sensors %}
      {% if state_attr(entity_id, 'date') == "Aujourd'hui" %}
        {% set ns.result = ns.result + [entity_id] %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

condition:
  - condition: template
    value_template: "{{ matches | length > 0 }}"

action:
  - action: "{{ notify_svc }}"
    data:
      title: "{{ title_rendered }}"
      message: "{{ message_rendered }}"

mode: single
